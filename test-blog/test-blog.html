<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="referrer" content="no-referrer" />
	<link rel="shortcut icon" href="../images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="../styles.css" media="screen" />
	<link rel="stylesheet" type="text/css" href="test-blog.css" media="screen" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/1.11/simplemde.min.css">
	<script src="https://cdn.jsdelivr.net/simplemde/1.11/simplemde.min.js"></script>
	<script src="https://unpkg.com/@popperjs/core@2"></script>
	<script src="https://unpkg.com/tippy.js@6"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://unpkg.com/alpinejs-fetch@latest/dist/api.min.js"></script>
	<!--% <script defer src="https://cdn.jsdelivr.net/gh/hankhank10/alpine-fetch@main/alpine-fetch.js"></script> -->
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4/dist/purify.min.js"></script>
	<script src="/htmx.js"></script>
	<script src="/cmbr.js"></script>

	<title>Chrispy's test-blog</title>
</head>

<body data-theme="dark">

	<nav id="nav" hx-get="/nav.html" hx-target="#nav" hx-trigger="load" hx-swap="innerHTML" x-bg></nav>

	<main id="blog-main" class="flex-grid-cmbr grid-col-1-3-1" x-data="{
		blogData: {},
		selectedBlogPost: {},

		settleBp: function (jsonBp) {
			document.getElementById('blog-post-id').innerHTML = this.selectedBlogPost.id;
			document.getElementById('blog-post-title').innerHTML = this.selectedBlogPost.title;
			document.getElementById('blog-post-location').innerHTML = this.selectedBlogPost.location;
			document.getElementById('blog-post-created_at').innerHTML = this.selectedBlogPost.created_at;
			document.getElementById('blog-post-audio').innerHTML = this.selectedBlogPost.audio;
			document.getElementById('blog-post-photos').innerHTML = this.selectedBlogPost.photos;
			document.getElementById('blog-post-tags').innerHTML = this.selectedBlogPost.tags;
			document.getElementById('blog-post-content').innerHTML = this.selectedBlogPost.content;
		},
		}">

		<!-- % LEFT -->
		<div class=" blog-item" id="blog-post-listings">

			<select id="blog-post-year-select">
				<option value="all-years">All Years</option>
				<template x-for="(blogpost, index) in blogData" :key="index">
					<option>
						<span x-html="blogpost.id"></span>
						<span x-html="blogpost.title"></span>
					</option>
				</template>
			</select>
			<br>
			<hr class="hr-cmbr-dark-gradient">
			<hr class="hr-groove-top">

			<ul id="blog-post-list">

			</ul>

			<hr class="hr-groove-bottom">
			<hr class="hr-cmbr-dark-gradient">

		</div>
		<!-- % CENTER -->
		<article id="blog-post-articles" class="blogging-font">
			<div class="blog-post-header">

				<button class="trigger-box" @click="settleBp(selectedBlogPost);">settle</button>

				<button class="trigger-box" hx-target="#blog-post-field" hx-get="./new-test-blog-13.html"
					hx-swap="innerHTML" hx-trigger="click">Get Post 13 as User 4</button>

				<button class="trigger-box" hx-get="./new-test-blog-all.html" hx-target="#blog-post-field"
					hx-trigger="click" hx-swap="innerHTML">Get All Blog
					Posts</button>
				<button class="trigger-box" hx-get="./new-test-blog-page.html" hx-target="#blog-post-field"
					hx-trigger="click" hx-swap="innerHTML">Post New Blog Post</button>

				<button id="previous-bp" class="blog-button">Previous</button>
				<button id="next-bp" class="blog-button">Next</button>
			</div>
			<div>
				<div>
					<p id="blog-post-created_at" x-ref="bp_date"></p>
					<p id="blog-post-location" x-ref="bp_location"></p>
					<p id="blog-post-time" x-ref="bp_time"></p>
				</div>
				<div id="blog-post-field">
					<p id="blog-post-content" x-ref="bp_content"></p>
				</div>
			</div>


		</article>

		<!-- % RIGHT -->
		<div class="blog-item" id="blog-post-media">
			<!-- <span class="vt323" id="auth-status"></span> -->
			<h3 x-text="'Post #'"><span id="blog-post-id" x-ref="bp_id"></span></h3>
			<h4><span id="blog-post-title" x-ref="bp_title"></span></h4>

			<hr class="hr-cmbr-dark-gradient">
			<hr class="hr-groove-top">

			<div id="blog-tags">
				<div id="blog-post-tags" x-ref="bp_tags"></div>
			</div>

			<div id="blog-map"></div>

			<div id="blog-post-photos">
			</div>

			<div id="blog-post-audio">
				<div id="player"></div>
			</div>

			<hr class="hr-groove-bottom">
			<hr class="hr-cmbr-dark-gradient">
		</div>

	</main>

	<script src="test-blog.js"></script>

</body>

</html>
