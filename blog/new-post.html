<div id="new-post-handle" class="cmbr-pen" x-data x-cloak>
	<div>
		<a href="blog.html" class="trigger-box marker">Return</a>

		<form action="/api/blog/" method="POST">
			<label for="title">Title &emsp;</label>
			<input type="text" name="title" :id=$id('title') required>

			<label for="date_posted">Date &emsp;</label>
			<input type="text" name="date_posted" :id=$id('date_posted')>

			<label for="location">Location &emsp;</label>
			<input type="text" name="location" :id=$id('location')>

			<label for="hours">Hours &emsp;</label>
			<input type="text" name="hours" :id=$id('hours')>

			<label for="audio">Audio &emsp;</label>
			<input type="text" name="audio" :id=$id('audio')>

			<label for="photos">Photos &emsp;</label>
			<input type="text" name="photos" :id=$id('photos')>

			<label for="tags">Tags &emsp;</label>
			<input type="text" name="tags" :id=$id('tags')>

			<div x-data="{
        		value: '<p>Been waiting for this, and plenty else.</p>',
				toolbarOptions: [['bold', 'italic', 'underline',], ['image', 'video', 'link'],  
				['blockquote', 'code-block'],
				[{'list': 'ordered'}, {'list': 'bullet'}, {'list': 'checked',}],
				[{ 'color': [] }, { 'background': [] }], [{ 'font': [] }]],
        		init() {
            		let quill = new Quill(this.$refs.quill, { 
						theme: 'snow',
						debug: 'info',
						modules: {
							toolbar: this.toolbarOptions,
						}
					 });
            		quill.root.innerHTML = this.value;
           			quill.on('text-change', () => {
                	this.value = quill.root.innerHTML;
           		});
       		 },
    		}">
				<div x-ref="quill"></div>
				<label for="content">Content &emsp;</label>
				<input type="hidden" name="content" x-bind:value="value" />
			</div>

			<button x-show="$store.nauth.valid" type="submit" class="blog-button">Submit</button>

		</form>
		<hr class="hr-push-up">
	</div>

</div>
