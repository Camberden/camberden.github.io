<div id="new-post-handle" class="blog-post-header" x-data="{
			allBp: $get('/api/blog/'),
		}" x-effect=" authManager.setupFormHandlers() ">
	<div>
		<button x-show="$store.nauth.valid" id="exit-new-bp">Return</button>

		<form action="/api/blog/" method="POST" class="grid-col-1-1">
			<label for="title">Title &emsp;</label>
			<input type="text" name="title" :id=$id('title') required>

			<label for="date_posted">Date &emsp;</label>
			<input type="text" name="date_posted" :id=$id('date_posted')>

			<label for="location">Location &emsp;</label>
			<input type="text" name="location" :id=$id('location')>

			<label for="hours">Hours &emsp;</label>
			<input type="text" name="hours" :id=$id('hours')>

			<label for="audio">Audio &emsp;</label>
			<input type="text" name="audio" :id=$id('audio')>

			<label for="photos">Photos &emsp;</label>
			<input type="text" name="photos" :id=$id('photos')>

			<label for="tags">Tags &emsp;</label>
			<input type="text" name="tags" :id=$id('tags')>

			<label for="content">Content &emsp;</label>
			<textarea name="content" :id=$id('content') rows="4" required></textarea>

			<div></div>
			<button x-show="$store.nauth.valid" type="submit">Submit</button>

		</form>
		<hr class="hr-push-up">
	</div>

	<div>
		<div id="all-bp-display">
			<div class="flex-table">
				<template x-for="(bp, index) in allBp" :key="index">
					<div :class="'flex-table-row grid-col-1-1-1'">
						<span x-html="bp.title"></span>
						<span x-html="bp.content"></span>
						<span x-html="bp.tags"></span>
					</div>
				</template>
			</div>
		</div>
	</div>
</div>
