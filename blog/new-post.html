<div id="new-post-handle" class="cmbr-pen" x-data x-cloak>
	<div>
		<a href="blog.html" class="trigger-box marker">Return</a>
		<hr class="hr-push-down">

		<!-- <form action="/api/blog/" method="POST"> -->
		<form hx-post="/api/blog/" hx-trigger="submit" hx-target="#modal-text" hx-swap="innerHTML">
			<label for="new-bp-title">Title &emsp;</label>
			<input id="new-bp-title" type="text" name="title" required />

			<label for="new-bp-date_posted">Date &emsp;</label>
			<input id="new-bp-date_posted" type="text" name="date_posted" />

			<label for="new-bp-location">Location &emsp;</label>
			<input id="new-bp-location" type="text" name="location" />

			<label for="new-bp-hours">Hours &emsp;</label>
			<input id="new-bp-hours" type="text" name="hours" />

			<label for="new-bp-audio">Audio &emsp;</label>
			<input id="new-bp-audio" type="text" name="audio" />

			<label for="new-bp-photos">Photos &emsp;</label>
			<input id="new-bp-photos" type="text" name="photos" />

			<label for="new-bp-tags">Tags &emsp;</label>
			<input id="new-bp-tags" type="text" name="tags" />

			<label for="new-bp-content">Content &emsp;</label>
			<input id="new-bp-content" type="text" name="content" />

			<button type="submit" class="blog-button">Submit</button>
		</form>
		<hr class="hr-push-up">
	</div>
