<!DOCTYPE html>
<html lang="en-US">
<!-- Hi there! :V -->

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="/styles.css" media="screen" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://unpkg.com/alpinejs-fetch@latest/dist/api.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4/dist/purify.min.js"></script>
	<script src="/cmbr.js"></script>
	<script src="/htmx.js"></script>
	<title>Chrispy's Worksite</title>
</head>

<body x-ref="body" data-theme="dark">

	<nav id="nav" hx-get="/nav.html" hx-target="#nav" hx-trigger="load" hx-swap="innerHTML" x-bg></nav>

	<main>
		<hr class="hr-push-down">

		<div id="cmbr-player-handle" x-data="{
			playSymbol: '&#9658;',
			pauseSymbol: '&#10073;&#10073;', // ⏸
			stopSymbol: '&#9632;',
			muteSymbol: '🔇',
			volumePercentage: '100%',
			trackDecimalPrecision: 2,

			vid: $refs.cmbrVideo,
			vidPlay: $refs.cmbrPlay,
			vidMute: $refs.cmbrMute,
			vidVolume: $refs.cmbrVolumeDisplay,
			vidProgress: $refs.cmbrVideoProgress,

			vidTimer: $refs.cmbrTimer,
			vidLength: $refs.cmbrVideoLength,

			vidProgressTimer: 1.00,
			vidProgressLength: 5.00,

			vidStats: function() {
				console.table({ 'Progress dot Value: ': this.vidProgress.value, 'Progress dot Max: ': this.vidProgress.max,
				'Vid Time Elapsed Confirmed: ': this.vid.currentTime, 'Vid Duration Confirmed: ': this.vid.duration,
			'Vid Progress Timer Variable: ': this.vidProgressTimer, 'Vid Progress Length Variable: ': this.vidProgressLength, });
			},

			alterPlay: function() {
				if (this.vid.paused || this.vid.ended) {
					this.vid.play();
					this.vidPlay.innerText = this.pauseSymbol;
				} else {
					this.vid.pause();
					this.vidPlay.innerText = this.playSymbol;
					this.vidStats();
				} 
			},

			alterStop: function() {
				this.vidStats();
				this.vid.pause();
				this.vid.currentTime = 0; 
				this.vidPlay.innerText = this.playSymbol;
				this.vidProgress.value = 0;
			},

			alterMute: function() {
				const currentVolume = (Math.floor(this.vid.volume * 10) / 10).toFixed(1);
				this.vid.muted = ! this.vid.muted;
				if (this.vid.muted) {
					this.muteSymbol = '&circledcirc;';
					this.volumePercentage = '0%';
				} else {
					this.muteSymbol = '&CircleTimes;';
					this.vid.volume = parseFloat(this.vid.volume).toFixed(1);
					this.volumePercentage = (parseFloat(this.vid.volume * 100).toFixed(0) + '%');
				}
			},

			alterVolume: function(raise) {
				const currentVolume = (Math.floor(this.vid.volume * 10) / 10).toFixed(1);
				this.vid.muted = false;
				if (raise && currentVolume < 1) {
					this.vid.volume += 0.1; 
					} else if (!raise && currentVolume > 0) {
					this.vid.volume -= 0.1;
					}
					this.volumePercentage = (parseFloat(this.vid.volume * 100).toFixed(0) + '%');
					console.table({'Current Vid Volume: ': parseFloat(this.vid.volume).toFixed(1), 'Volume Percentage: ': this.volumePercentage, });
			},}" x-initialized=" vidStats(); 
			">

			<!-- % HERE'S THE player -->
			<figure id="cmbr-player" !vid-paused>
				<figcaption>
					<menu id="video-controls-support" x-show="true">

						<div class="grid-col-1-1">
							<li class="cmbr-player-visual" x-text="'CMBR Mediatool'"></li>
							<select x-ref="mediatoolLoadedTrack" class="cmbr-player-control">
								<option>tunes</option>
								<option value="../assets/music-tracks/music-the-deficit-of-patience.mp4" selected>
									Deficit
								</option>
								<option value="../assets/music-tracks/music-meaning.mp4">Meaning
								</option>
							</select>
						</div>
						<div>
							<li class="cmbr-player-visual">
								<h5 x-text="$refs.mediatoolLoadedTrack.value">The Deficit of Patience [scraped]</h5>
							</li>
						</div>

					</menu>
				</figcaption>

				<video x-ref="cmbrVideo" id="cmbr-video" controls="true" videoHeight="75" videoWidth="150"
					poster='../assets/artifacts/foxfire.jpeg' loop preload="metadata" x-effect="$el.controls = false"
					@onloadedmetadata=" vidProgressTimer=parseFloat($el.currentTime).toFixed(trackDecimalPrecision); vidProgressLength=parseFloat($el.duration).toFixed(trackDecimalPrecision);"
					@ondurationchange="vidProgressLength = parseFloat($el.duration).toFixed(trackDecimalPrecision); vidProgress.max = parseFloat($el.duration).toFixed(trackDecimalPrecision);"
					@timeupdate="vidProgress.value = parseFloat($el.currentTime).toFixed(trackDecimalPrecision); vidProgress.max = parseFloat($el.duration).toFixed(trackDecimalPrecision); 
					vidProgressTimer = vidProgress.value; vidProgressLength = vidProgress.max;" @click="alterPlay()">
					<source src=" ../assets/music-tracks/music-the-deficit-of-patience.mp4" type="video/mp4" />
					<track default kind="captions" srclang="en" label="English"
						src="../assets/music-tracks/music-the-deficit-of-patience.vtt" type="text/vtt" />

				</video>

				<figcaption>
					<menu id="video-controls" x-show="true">

						<div class="grid-col-1-4">
							<li x-ref="cmbrPlay" class="cmbr-player-control" @click="alterPlay()" x-text="playSymbol">
							</li>
							<li class="cmbr-player-visual">
								<progress x-ref="cmbrVideoProgress" id="progress" max="vidProgressLength"
									value="1.00"></progress>
							</li>
						</div>

						<div class="grid-col-4-1">
							<li class="cmbr-player-visual">
								<span x-ref="cmbrTimer" x-html="vidProgressTimer"></span>/
								<span x-ref="cmbrVideoLength" x-html="vidProgressLength"></span>
							</li>
							<select class="cmbr-player-control" @change="trackDecimalPrecision = $el.value">
								<option>Prc.</option>
								<option value="0">0</option>
								<option value="1">1.0</option>
								<option value="2">2.00</option>
								<option value="3">3.000</option>
							</select>
						</div>

						<div class="grid-col-1-3-1">
							<li class="cmbr-player-control" @click="alterVolume(false)" x-text="'Vol-'"></li>
							<li class="cmbr-player-visual">
								<span x-ref="cmbrVolumeDisplay" x-text="volumePercentage"></span>
							</li>
							<li class="cmbr-player-control" @click="alterVolume(true)" x-text="'Vol+'">
							</li>
						</div>
						<div>
							<li x-ref="cmbrMute" class="cmbr-player-control" @click="alterMute()" x-text="muteSymbol">
							</li>
							<li class="cmbr-player-control" @click="alterStop()" x-text="stopSymbol">
							</li>
						</div>

					</menu>
				</figcaption>

			</figure>
		</div>

	</main>
</body>

</html>
