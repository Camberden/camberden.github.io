<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="../images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="../styles.css" media="screen" />
	<link rel="stylesheet" type="text/css" href="workspace.css" media="screen" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
	<script defer src="https://unpkg.com/@popperjs/core@2"></script>
	<script defer src="https://unpkg.com/tippy.js@6"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
	<script src="../htmx.js"></script>
	<script src="../cmbr.js"></script>
	<title>Chrispy's Workspace</title>
</head>

<body data-theme="dark">

	<nav>
		<div class="nav-sail">

			<!-----| NAV 1 |----->
			<div id="nav-1" x-data="{ active: 0 }">
				
				<div x-data="{
					id: 1,
					get expanded() {
						return this.active === this.id
					},
					set expanded(value) {
						this.active = value ? this.id : null
					},
					}" role="region" class="">
						<button
							type="button"
							x-on:click="expanded = !expanded"
							:aria-expanded="expanded"
							id="chart-access">
							<div class="trigger-dropdown">
								<span x-show="expanded" x-cloak>&UpArrow;</span>
								<span x-show="!expanded" x-cloak>&DownArrow;</span>
								<span>Options</span>
								<span x-show="expanded">&UpArrow;</span>
								<span x-show="!expanded">&DownArrow;</span>
							</div>
						</button>
					<div id="chart-dropdown" x-cloak x-show="expanded" x-collapse>
						<div id="chart-links">
						</div>
					</div>
				</div>
				<!-- <span id="nav-sig"></span> -->

			</div>

			<!-----| NAV 2 |----->
			<div id="nav-2">
				<h1 class="h1-lamp">
					<!-- ♪ -->
				</h1>
			</div>

			<!-----| NAV 3 |----->
			<div id="nav-3">
				<h1 class="h1-lamp">Workspace</h1>
			</div>

			<!-----| NAV 4 |----->
			<div id="nav-4">
				<h1 class="h1-lamp">
					<!-- ♫ -->
				</h1>
			</div>

			<!-----| NAV 5 |----->
			<div id="nav-5">
				<span class="data-theme-button" id="dark">🌙</span>
				<span class="data-theme-button" id="light">☀️</span>
				<span class="data-theme-button" id="legacy">🪻</span>
			</div>

		</div>

		<div class="nav-hoist">
			<hr class="hr-nav-pad">
			<hr class="hr-blass">
			<hr class="hr-cmbr-gradient">
			<hr id="nav-anchor" class="hr-groove-top">
		</div>

	</nav>
	<hr class="hr-push-down">
	<div class="button-grid-row">
		<button class="trigger-box" hx-get="../template/reeducation.html" hx-target="#wksp-left" hx-trigger="click" hx-swap="innerHTML">Reeducation</button>
		<button class="trigger-box" hx-get="../template/scuffle.html" hx-target="#wksp-center" hx-trigger="click" hx-swap="innerHTML">Fighters</button>
		<button class="trigger-box" hx-get="../template/calendar.html" hx-target="#wksp-center" hx-trigger="click" hx-swap="innerHTML">Calendar</button>
		<button class="trigger-box" hx-get="../template/taxability.html" hx-target="#wksp-center" hx-trigger="click" hx-swap="innerHTML">Taxability</button>
		<button class="trigger-box" hx-get="../template/roles.html" hx-target="#wksp-right" hx-trigger="click" hx-swap="innerHTML">Roles & Such</button>
		
	</div>
	<div class="cmbr-grid">

		<div id="wksp-left" class="cmbr-item cmbr-item-left">

		</div>

		<div id="wksp-center" class="cmbr-item cmbr-item-center">

		</div>

		<div id="wksp-right" class="cmbr-item cmbr-item-right">

		</div>


	</div>


	<!-- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --  -->

	
	<footer id="workspace-footer">
		<hr class="hr-groove-top">
		<h6></h6>
		<p class="eremoran-kiptascript">dir nao sudoz kaldoz ne</p>
	</footer>

<script src="workspace.js"></script>

</body>

</html>
