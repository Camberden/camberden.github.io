<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="../images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="../styles.css" media="screen" />
	<link rel="stylesheet" type="text/css" href="workspace.css" media="screen" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
	<script src="https://unpkg.com/@popperjs/core@2"></script>
	<script src="https://unpkg.com/tippy.js@6"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4/dist/purify.min.js"></script>
	
	
	<script src="../cmbr.js"></script>
	<script src="../htmx.js"></script>
	<title>Chrispy's Workspace</title>
</head>

<body data-theme="dark">

	<nav id="nav" hx-get="/nav.html" hx-target="#nav" hx-trigger="load" hx-swap="innerHTML" x-bg></nav>


	<hr class="hr-push-up">
	<div class="button-grid-row">
		<!-- % LEFT -->
		<button class="trigger-box" hx-get="../template/reeducation.html" hx-target="#wksp-left" hx-trigger="click"
			hx-swap="innerHTML">Reeducation</button>
		<!-- % CENTER -->
		<button class="trigger-box" hx-get="../template/scuffle.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Fighters</button>
		<button class="trigger-box" hx-get="../template/seg.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Seg</button>
		<button class="trigger-box" hx-get="../template/calendar.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Calendar</button>
		<button class="trigger-box" hx-get="../sections.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Sitemap</button>
		<button class="trigger-box" hx-get="../template/taxability.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Taxability</button>

		
		<button class="trigger-box" id="auth-status" disabled>Not logged in</button>

		<!-- % RIGHT -->
		<button class="trigger-box" hx-get="../template/roles.html" hx-target="#wksp-right" hx-trigger="click"
			hx-swap="innerHTML">Roles & Such</button>
		<button class="trigger-box">Songs</button>
		<!-- % GRID -->
		<button class="trigger-box" hx-get="../template/greatregions.html" hx-target="#wksp-grid" hx-trigger="click"
			hx-swap="innerHTML">Great Regions</button>
			
	</div>
	<div class="cmbr-grid">

		<div id="wksp-left" class="cmbr-item cmbr-item-left">
			<ul id="songs">

			</ul>
		</div>

		<div id="wksp-center" class="cmbr-item cmbr-item-center">


		</div>

		<div id="wksp-right" class="cmbr-item cmbr-item-right">
			<form x-target="songs" action="../template/songs.html">
				<input name="search" @input.debounce="$el.form.requestSubmit()" type="text" placeholder="Search songs...">
			</form> 
		</div>

	</div>

		
	<div id="wksp-grid">
	</div>

	<!-- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --  -->


	<footer id="workspace-footer">
		<hr class="hr-groove-top">
		<h6 x-text="marked.parse('# Marked in the browser\n\nRendered by **marked**.')"></h6>
		<span x-html="marked.parse(`### Fix Salary Schedule to Month Based ✔️
		1. Base the calculations on Months not Years 
		* @2025: Built paycard generator`)"></span>

		<p class="eremoran-kiptascript">dir nao sudoz kaldoz ne</p>
	</footer>

	<script src="workspace.js"></script>

</body>

</html>
