	<div id="workspace-monitor" class="grid-col-1-3-1"
		style="border:0.2rem; padding:0.1rem; border: 0.2rem ridge burlywood; padding: 0.8rem;">

		<div id="workspace-notifier" x-data="{
		notifications: [],
		add(e) {
			this.notifications.push({
				id: e.timeStamp,
				type: e.detail.type,
				content: e.detail.content,
			})
		},
		remove(notification) {
			this.notifications = this.notifications.filter(i => i.id !== notification.id)
		},
		}" @notify.window="add($event)"
			style="display:fixed; bottom:0; right:0; flex:1; width:100%; justify-items: start; z-index: 10; padding-right: 1rem; padding-bottom: 1rem;"
			role=" status" aria-live="polite">
			<!-- Notification -->
			<template x-for="notification in notifications" :key="notification.id">
				<div x-data="{
			show: false,
			init() {
				this.$nextTick(() => this.show = true)

				setTimeout(() => this.transitionOut(), 5000)
			},
			transitionOut() {
				this.show = false

				setTimeout(() => this.remove(this.notification), 5000)
			},
		}" x-show="show" x-transition.duration.500ms style="position:fixed; bottom:0; right:0;">
					<div style="display: flex;">
						<div style="flex-flow: column wrap;  gap:1rem; z-index:10;">
							<!-- Icons -->
							<div x-show="notification.type === 'info'" style="flex-shrink: 1;">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="cornflowerblue"
									class="admiration"
									style="display:inline-flex; align-self:center; justify-self:center; padding:1.5rem; border-radius:0.5rem;">
									<path fill-rule="evenodd"
										d="M15 8A7 7 0 1 1 1 8a7 7 0 0 1 14 0ZM9 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM6.75 8a.75.75 0 0 0 0 1.5h.75v1.75a.75.75 0 0 0 1.5 0v-2.5A.75.75 0 0 0 8.25 8h-1.5Z"
										clip-rule="evenodd" />
								</svg>
								<span class="sr-only">Information:</span>
							</div>

							<div x-show="notification.type === 'success'" style="flex-shrink: 1;">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="chartreuse"
									class="caution"
									style="display:inline-flex; align-self:center; justify-self:center; padding:1.5rem; border-radius:0.5rem;">
									<path fill-rule="evenodd"
										d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14Zm3.844-8.791a.75.75 0 0 0-1.188-.918l-3.7 4.79-1.649-1.833a.75.75 0 1 0-1.114 1.004l2.25 2.5a.75.75 0 0 0 1.15-.043l4.25-5.5Z"
										clip-rule="evenodd"></path>
								</svg>
								<span class="sr-only">Success:</span>
							</div>

							<div x-show="notification.type === 'error'" style="flex-shrink: 1;">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="indianred"
									class="trauma"
									style="display:inline-flex; align-self:center; justify-self:center; padding:1.5rem; border-radius:0.5rem;">
									<path fill-rule="evenodd"
										d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14ZM8 4a.75.75 0 0 1 .75.75v3a.75.75 0 0 1-1.5 0v-3A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
										clip-rule="evenodd"></path>
								</svg>
								<span class="sr-only">Error:</span>
							</div>

							<!-- Text -->
							<div class="">
								<p x-text="notification.type" class="capitalize font-medium text-sm text-gray-800"></p>

								<div class="text-sm text-gray-600" x-text="notification.content"></div>
							</div>
						</div>
						<!-- Remove button -->
						<!-- <div style="display:flex; align-items: center;">
					<span @click="transitionOut()" type="button"
						style="display:inline-flex; align-self:center; justify-self:center; padding:1.5rem; border-radius:0.5rem;">
						<svg aria-hidden class="size-5" viewBox="0 0 20 20" fill="currentColor">
							<path fill-rule="evenodd"
								d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
								clip-rule="evenodd"></path>
						</svg>
						<span class="sr-only">Close notification</span>
					</span>
				</div> -->
					</div>
			</template>

			<form x-data="{
	content: 'Something happened!',
	type: 'info',
}" class="common-background" x-on:submit.prevent="$dispatch('notify', { content, type })">

						<option value="error">Error</option>
					</select>
				</div>

				<div class="mt-8">
					<button class="trigger-box" style="position:relative;">
						Dispatch notification
					</button>
				</div>
			</form>
