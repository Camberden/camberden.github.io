<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="/images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="/styles.css" media="screen" />
	<link rel="stylesheet" type="text/css" href="workspace.css" media="screen" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
	<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/1.11/simplemde.min.css">
	<script src="https://cdn.jsdelivr.net/simplemde/1.11/simplemde.min.js"></script>
	<script async src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
	<script src="https://unpkg.com/@popperjs/core@2"></script>
	<script src="https://unpkg.com/tippy.js@6"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://unpkg.com/alpinejs-fetch@latest/dist/api.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4/dist/purify.min.js"></script>
	<script src="/cmbr.js"></script>
	<script src="/htmx.js"></script>
	<title>Chrispy's Workspace</title>
</head>

<body x-ref="body" data-theme="dark">

	<nav id="nav" hx-get="/nav.html" hx-target="#nav" hx-trigger="load" hx-swap="innerHTML" x-bg></nav>

	<hr class="hr-push-up">
	<div id="wksp-button-control" class="button-grid-row"
		style="border:0.2rem ridge burlywood; background-image: var(--mosky-3); padding: 0.8rem;">

		<button class="trigger-box" hx-get="../template/calendar.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Calendar</button>
		<button class="trigger-box" hx-get="../template/roles.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Acc. Jobs</button>
		<button class="trigger-box" hx-get="../sections.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Sitemap</button>
		<button class="trigger-box" hx-get="../template/texteditor.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Text Editor</button>
		<button class="trigger-box" hx-get="../template/reeducation.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Reeducation</button>
		<button class="trigger-box" hx-get="../template/scuffle.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Scuffle</button>
		<button class="trigger-box" hx-get="../template/seg.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Seg</button>
		<button class="trigger-box" hx-get="../template/dummyjson.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Dummyjson</button>
		<button class="trigger-box" hx-get="../template/depository.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">New Note</button>
		<button class="trigger-box" hx-get="../blog/new-blog-post.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">New Blog Post</button>
		<button class="trigger-box" hx-get="../template/heic-convert.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Heic to Jpeg</button>
		<button class="trigger-box" hx-get="../template/mdeditor.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Markdown Editor</button>
		<button class="trigger-box" hx-get="../template/greatregions.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Great Regions</button>
		<button class="trigger-box" hx-get="../template/rainfall.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Rainfall</button>
		<button class="trigger-box" hx-get="../template/cmbrstyle.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">cmbr Styles</button>
		<button class="trigger-box" hx-get="../template/uploads.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Uploads</button>
		<button class="trigger-box" hx-get="../template/travel-photos.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Travel Photos</button>
		<!-- <button class="trigger-box" hx-get="../template/mediatool.html" hx-target="#wksp-center" hx-trigger="click"
			hx-swap="innerHTML">Mediatool</button> -->

	</div>

	<hr class="hr-cmbr-gradient">
	<!--^^-->
	<div id="workspace-monitor" class="grid-col-1-3-1"
		style="border:0.2rem; padding:0.1rem; border: 0.2rem ridge burlywood; padding: 0.8rem;" x-data>

		<div id="workspace-notifier" value="loginlogout" hx-get="../template/exmodal.html" hx-target="#loginlogout"
			hx-trigger="load delay:1200ms" hx-swap="outerHTML" x-transition>
			<button id="loginlogout" class="trigger-box">
				<img width="100%" height="100%" src="../images/squares-fade.svg" alt="loading..." cmbr-loading />
			</button>
		</div>

		<!--|=====|-->
		<div id="workspace-console" class="flex-table vt323 grid-col-5x-1" style="border-left: 0.3rem ridge grey; border-right: 0.3rem ridge grey; background-color: black;
			 font-size: 1rem; color: lime; max-height: 20rem; overflow-y: scroll;">
			<div x-data>
				<div x-text="baseHyperlinks[0] + ' | ' + baseHyperlinks[1]"></div>
				<div x-text="document.location"></div>
				<div hx-post="/api/auth/version" hx-trigger="load" hx-target="this" hx-swap="outerHTML"></div>
				<div x-text="CMBRutil.convertToPreferredDateFormat(new Date(), false)"></div>
				<div x-show="false" x-autograph x-text="'loaded.'">
					<img width="100%" height="100%" src="../images/squares-fade.svg" alt="loading..." cmbr-loading />
				</div>
			</div>

			<!--|=====|-->
		</div>

		<div id="workspace-config">
			<span x-show="true" style="width:15rem; height:10rem; box-sizing: border-box; border: 0.5rem solid fuchia;">
				<img width="50%" height="fit-content" src="../images/cmbr-sig-transform.svg" alt="emblem" />
			</span>
		</div>

	</div>
	<!--^^-->
	<hr class="hr-cmbr-gradient">



	<div class="flex-grid-cmbr" x-data="{
	}">
		<!--^^-->
		<hr class="hr-push-down">
		<hr class="hr-groove-top">
		<!--^^-->
		<div id="wksp-center" style="background: var(--cmbr-blass); padding: 0.8rem;"
			x-text="'*Function Execution Button Appears Here'">
		</div>
		<!--^^-->
		<hr class="hr-groove-bottom">
		<hr class="hr-push-down">
		<!--^^-->



		<hr class="hr-push-down">
	</div> <!-- ^ end cmbr grid -->
	<!--^^-->
	<hr class="hr-push-down">
	<!--^^-->



	<!-- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --  -->

	<footer id="workspace-footer">
		<p class="eremoran-kiptascript">dir nao sudoz kaldoz ne</p>
	</footer>


</body>

</html>
