<!DOCTYPE html>
<html lang="en-US">

<head>
	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- <meta name="referrer" content="origin" /> -->
	<link rel="shortcut icon" href="..images/cmbr-sig.svg">
	<link rel="stylesheet" type="text/css" href="../styles.css" media="screen" />
	<!-- <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script> -->
	<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.6/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
	<script src="../htmx.js"></script>
	<script src="../cmbr.js"></script>
	<script src="./auth-manager.js"></script>
	<title>Chrispy's TEMPLATE</title>
</head>

<body data-theme="legacy">

	<nav><!--|=====| BEGIN NAVIGATION |=====|!----->

		<div class="nav-sail">

			<!-----| NAV 1 |----->
			<div id="nav-1" x-data="{ active: 0 }">

				<div x-data="{
					id: 1,
					get expanded() {
						return this.active === this.id
					},
					set expanded(value) {
						this.active = value ? this.id : null
					},
					}" role="region" class="">
					<button type="button" x-on:click="expanded = !expanded" :aria-expanded="expanded" id="chart-access">
						<div class="trigger-dropdown">
							<span x-show="expanded" x-cloak>&UpArrow;</span>
							<span x-show="!expanded" x-cloak>&DownArrow;</span>
							<span>Options</span>
							<span x-show="expanded">&UpArrow;</span>
							<span x-show="!expanded">&DownArrow;</span>
						</div>
					</button>
					<div id="chart-dropdown" x-show="expanded" x-collapse>
						<div id="chart-links">
						</div>
					</div>
				</div>
				<span id="nav-sig"></span>

			</div>

			<!-----| NAV 2 |----->
			<div id="nav-2">
				<h1 class="h1-lamp">
					<!-- ♪ -->
				</h1>
			</div>

			<!-----| NAV 3 |----->
			<div id="nav-3">
				<h1 class="h1-lamp">Workspace</h1>
			</div>

			<!-----| NAV 4 |----->
			<div id="nav-4">
				<h1 class="h1-lamp">
					<!-- ♫ -->
				</h1>
			</div>

			<!-----| NAV 5 |----->
			<div id="nav-5">
				<span class="data-theme-button" id="dark">🌙</span>
				<span class="data-theme-button" id="light">☀️</span>
				<span class="data-theme-button" id="legacy">🪻</span>
			</div>

		</div>

		<div class="nav-hoist">
			<hr class="hr-nav-pad">
			<hr class="hr-blass">
			<hr class="hr-cmbr-gradient">
			<hr id="nav-anchor" class="hr-groove-top">
		</div>

	</nav><!-----|=====| END NAVIGATION |=====|!-->


	<main class="cmbr-grid">


		<div class="cmbr-item-left">
			<div id="focal" style="width:100;height:20rem;background:black;border:0.3rem groove rosybrown;">
				<p class="marker-green" style="font-size: 26px"><br>&emsp; øH/«![/H)'/]^)H'¬L/<br>
					¬]'/H[*'v'{';{[\\
				</p>
			</div>

		</div>

		<div class="cmbr-item-center flex-table">
			<h1 class="marker-green">Database Tester</h1>
			<p id="auth-status" style="font-weight: bold; margin: 0.5rem 0;">Not logged in</p>
			<br>
			<form id="logout-button" action="/api/auth/logout" method="POST">
				<button class="trigger-box" id="logout">Logout</button>
			</form>
			<hr class="hr-cmbr-gradient">
			<hr class="hr-groove-top">

			<div>
				<h2 class="marker">Registration</h2>
				<hr class="hr-trans">
				<hr class="hr-push-down">
				<form id="register-form" action="/api/auth/register" method="POST" class="grid-col-1-1">
					<label for="register-username">Enter username &emsp;</label>
					<input type="text" id="register-username" name="username" autocomplete="username" required>

					<label for="new-password">Enter password &emsp;</label>
					<input type="password" id="new-password" name="password" autocomplete="new-password" required>

					<label for="email">Enter email &emsp;</label>
					<input type="email" id="email" name="email" autocomplete="email" required>

					<div></div>
					<button type="submit">Register</button>
				</form>
				<hr class="hr-push-up">
			</div>

			<div>
				<h2 class="marker">Login</h2>
				<hr class="hr-trans">
				<hr class="hr-push-down">
				<form id="login-form" action="/api/auth/login" method="POST" class="grid-col-1-1">
					<label for="login-username">Enter username &emsp;</label>
					<input type="text" id="login-username" name="username" autocomplete="username" required>

					<label for="current-password">Enter password &emsp;</label>
					<input type="password" id="current-password" name="password" autocomplete="current-password" required>
					
					<div></div>
					<button type="submit">Login</button>
				</form>
				<hr class="hr-push-up">
			</div>

			<div>
				<h2 class="marker">Make Note</h2>
				<hr class="hr-trans">
				<hr class="hr-push-down">
				<form id="make-note-form" action="/api/notes/" method="POST" class="grid-col-1-1">
					<label for="title">Title &emsp;</label>
					<input type="text" id="title" name="title" required>

					<label for="tags">Tags &emsp;</label>
					<input type="text" id="tags" name="tags" required>

					<label for="location">Location &emsp;</label>
					<input type="text" id="location" name="location">

					<label for="photos">Photos &emsp;</label>
					<input type="text" id="photos" name="photos">

					<label for="audio">Audio &emsp;</label>
					<input type="text" id="audio" name="audio">

					<label for="body">Body &emsp;</label>
					<textarea id="body" name="body" rows="4"></textarea>


					<div></div>
					<button type="submit">Make Note!</button>
				</form>
				<hr class="hr-push-up">
			</div>


		</div> <!-- End Table -->

		<div class="cmbr-item-right" hx-trigger="load" hx-get="/api/notes/" hx-target="#all-notes-display" hx-swap="innerHTML">
			<h2 class="marker-green">All Notes</h2>
			<hr class="hr-cmbr-dark-gradient">
			<hr class="hr-push-down">
			<div id="all-notes-display">
				<!-- Notes will be loaded here -->
				<pre id="all-notes-display">Loading notes...</pre>


			</div>

		</div>

		<hr class="hr-push-down">

	</main>

	<script src="template.js"></script>

</body>


</html>
