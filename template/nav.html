    <div id="nav-1" x-data="{ active: 0 }">

        <div x-data="{
					id: 1,
					get expanded() {
						return this.active === this.id
					},
					set expanded(value) {
						this.active = value ? this.id : null
					},
					}" role="region"> 
            <button id="chart-access" type="button" @click="expanded = !expanded" hx-get="../sections.html" hx-target="#chart-links" hx-trigger="click" hx-swap="innerHTML">
                <div class="trigger-dropdown">
                    <span x-show="expanded" x-cloak>&UpArrow;</span>
                    <span x-show="!expanded" x-cloak>&DownArrow;</span>
                    <span>Options</span>
                    <span x-show="expanded" x-cloak>&UpArrow;</span>
                    <span x-show="!expanded" x-cloak>&DownArrow;</span>
                </div>
            </button>
            <div id="chart-dropdown" x-show="expanded" x-cloak x-collapse>
                <div id="chart-links">
                    <template x-show="expanded">
                        
                    </template>
                </div>
            </div>
        </div>

    </div>
