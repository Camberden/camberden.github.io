<style>

</style>

<div id="dashboard-days-lived" class="dashboard-item flex-table" x-data="{
	presentDate: new Date(),
	getDaysInMonthOfYear: function (year, month) {
		return new Date(year, month, 0).getDate();
	},
	findDaysSinceBirthday: function (present, birth) {
		const yearsSinceBirth = present.getFullYear() - birth.getFullYear() - 1; // -1 accounts for present year lived months
		const monthOfBirthDaysTotal = new Date(birth.getFullYear(), birth.getMonth(), 0).getDate();
		const monthOfBirthDaysLived = monthOfBirthDaysTotal - birth.getDate();
		const presentMonthDaysLived = present.getDate();
		let totalDaysLived = monthOfBirthDaysLived + presentMonthDaysLived;
		const monthsRemainingInBirthYear = 12 % birth.getMonth();
		const monthsRemainingInPresentYear = present.getMonth();
		const daysRemainingInBirthYear = this.getDaysInMonthOfYear(birth.getFullYear(), (birth.getMonth() + monthsRemainingInBirthYear));
		// Gathers days following birth month for all months of birth year.
		for (let i = 1; i <= monthsRemainingInBirthYear; i++) {
			totalDaysLived += this.getDaysInMonthOfYear(birth.getFullYear(), (birth.getMonth() + i)); // BIRTH doesn't need +1; it's inbuilt
		}
		// Gathers days before present month for all lived months of current year.
		if (present.getMonth() > 0) {
			for (let i = present.getMonth(); i >= 0; i--) {
				totalDaysLived += this.getDaysInMonthOfYear(present.getFullYear(), ((present.getMonth() + 1) - i)); // +1 FOR DAY COUNT VALUES ONLY
			}
		}
		// Gathers days between birth year and present year.
		let by = birth.getFullYear() + 1;
		for (let i = 0; i < yearsSinceBirth; i++) {
			for (let j = 1; j <= 12; j++)
				totalDaysLived += this.getDaysInMonthOfYear(by, j);
		}
		return totalDaysLived;
	},

	daysSinceBirth: this.findDaysSinceBirthday(new Date(), (new Date(1993, 11, 14))),

}">
	<div>
		<h2 class="marker-green">Time in this World</h2>
		<hr class="hr-cmbr-dark-gradient">
	</div>
	<div class="grid-col-1-1">
		<div class="flex-table-row grid-row-1" style="display:contents">
			<span>Days Lived: </span><u x-text=" daysSinceBirth "></u>
		</div>
		<div class="flex-table-row grid-row-1" style="display:contents">
			<span>Weeks Lived: </span><u x-text=" (daysSinceBirth / 7).toFixed(2) "></u>
		</div>
		<div class="flex-table-row grid-row-1" style="display:contents">
			<span>Years Lived: </span><u x-text=" (daysSinceBirth / 366).toFixed(2) "></u>
		</div>
	</div>
</div>
