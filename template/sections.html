<div x-data="{ 
    atHome: CMBRutil.atSiteIndex(),
    atLegacyHome: CMBRutil.atLegacyIndex(),
    homePage:  'Homepage Redux ↺',
    legacyHomepage:  'Legacy Homepage ↺',
    sitemap: {
        links: {
                internal: [
                    ['dashboard', 'Personal Dashboard'],
                    ['workspace', 'Coding Workspace'],
                    ['blog', 'Blogging Page'],
                    // ['accounting', 'Accounting Resource'],
                    ['travel', 'Travel Page'],
                    // ['lifecraft', 'Lifecraft Page'],
                    ['musings', 'Musings Page'],
                    // ['template', 'Template'],
                    // ['fantasy', 'Fantasyland'],
                    // ['segregation', 'Segregation'],
                    // ['mainframe', 'Mainframe'],
                    ['music', 'Original Music'],
                ],
                external: [
                    ['Checkpoint', 'https://www.youtube.com/watch?v=XgqTrvcAySA',],
                    ['Anki Web', 'https://ankiweb.net/'],
                    ['Clozemaster', 'https://www.clozemaster.com'],
                    ['Jisho', 'https://jisho.org'],
                    ['NHK Yasashii', 'https://www3.nhk.or.jp/news/easy/',],
                    ['Coursework', 'https://account.cengage.com/login?',],
                    ['Maps', 'https://maps.google.com',],
                    ['Internal Jobs', 'https://wd108.myworkday.com/wday/authgwy/nc/login.html',],
                    ['Intranet', 'https://int.dac.nc.gov',],
                    ['Fiori', 'https://portal.osc.nc.gov/app',],
                    ['Alpine Components', 'https://alpinejs.dev/components'],
                ]
            },
        },
    }">


    <template x-if="atLegacyHome">
        <div :class="'section-title'">
            <a x-text="homePage"
                :href="'/index.html'"
                :data-route="'/'">
            </a>
        </div>
    </template>

    <template x-if="atHome || atLegacyHome">
        <div>
            <template x-for="link in sitemap.links.internal", :key="index">
                <div :class="'section-title'">
                    <a x-text="link[1]"
                        :href="link[0] + '/' + link[0] + '.html'"
                        :data-route="'/' + link[0] + '/'">
                    </a>
                </div>
            </template>
        </div>
    </template>

    <template x-if="atHome">
        <div :class="'section-title'">
            <a x-text="legacyHomepage"
                :href="'/legacyindex.html'"
                :data-route="'/legacyindex.html'">
            </a>
        </div>
    </template>

    <template x-if="!atHome && !atLegacyHome">
        <div>
            <template x-for="link in sitemap.links.internal", :key="index">
                <div :class="'section-title'">
                    <a x-text="link[1]"
                        :href="link[0] + '/' + link[0] + '.html'"
                        :data-route="'/' + link[0] + '/'">
                    </a>
                </div>
            </template>
        </div>
    </template>

    <template x-if="!atHome && !atLegacyHome">
        <div>
            <template x-for="link in sitemap.links.external">
                <div :class="'section-title'">
                    <a x-text="link[0]"
                        :href="link[1]">
                    </a>
                </div>
            </template>
        </div>
    </template>

</div>
